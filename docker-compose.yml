services:
  api:
    build: .
    container_name: fastapi_credit
    command: uvicorn app.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  frontend:
    build: .
    container_name: streamlit_credt
    command: streamlit run app/chatbot/chatbot.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api